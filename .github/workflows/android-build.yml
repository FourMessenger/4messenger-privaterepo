name: Build Android App

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      
      - name: Build with Gradle
        run: cd android && ./gradlew assembleRelease
      
      - name: Generate Release Tag and Name
        id: release_info
        run: |
          # Генерируем версию на основе даты и времени
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "tag_name=${VERSION}" >> $GITHUB_OUTPUT
          echo "release_name=Android Release ${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          body: |
            ## Automatic Android Release
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Triggered by changes in android/ folder
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK (for all branches/debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
